<!DOCTYPE html>
<html>
<head>
    <title>Exercise 1 - Localhost</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .output { background: #f0f8ff; padding: 20px; border-left: 4px solid #007acc; }
        h1 { color: #007acc; }
    </style>
</head>
<body>
    <h1>Exercise 1 - Student Marks (ES6)</h1>
    <div id="output"></div>

    <script>
        let studentName = "Vineetha";
        let mark1 = 85;
        let mark2 = 90;
        let mark3 = 88;
        
        const calculateAverage = (m1, m2, m3) => {
            return (m1 + m2 + m3) / 3;
        };
        
        let totalMarks = mark1 + mark2 + mark3;
        let average = calculateAverage(mark1, mark2, mark3);
        
        // Display using template literals in webpage
        document.getElementById('output').innerHTML = `
            <div class="output">
                <strong>Student Name:</strong> ${studentName}<br>
                <strong>Total Marks:</strong> ${totalMarks}<br>
                <strong>Average Marks:</strong> ${average.toFixed(2)}
            </div>
        `;
    </script>
</body>
</html>
