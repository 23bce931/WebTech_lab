<!DOCTYPE html>
<html>
<head>
    <title>Exercise 3 - Localhost</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .output { background: #f0f8ff; padding: 20px; border-left: 4px solid #007acc; margin: 10px 0; }
        h1 { color: #007acc; }
    </style>
</head>
<body>
    <h1>Exercise 3 - ES6 Classes & Promises</h1>
    <div id="output1"></div>
    <div id="output2"></div>

    <script>
        // ES6 Class
        class Course {
            constructor(courseName, instructor) {
                this.courseName = courseName;
                this.instructor = instructor;
            }
            
            displayCourse() {
                return `Course: ${this.courseName}, Instructor: ${this.instructor}`;
            }
        }

        // Create course instance
        let course1 = new Course("Web Technologies", "Dr. Gopikrishnan");
        document.getElementById('output1').innerHTML = `
            <div class="output">
                ${course1.displayCourse()}
            </div>
        `;

        // Promise for enrollment
        let enrollCourse = new Promise((resolve, reject) => {
            let seatsAvailable = true;
            if (seatsAvailable)
                resolve("Enrollment Successful");
            else
                reject("Course Full");
        });

        // Handle promise
        enrollCourse
            .then(msg => {
                document.getElementById('output2').innerHTML = `
                    <div class="output">
                        ${msg}
                    </div>
                `;
            })
            .catch(err => {
                document.getElementById('output2').innerHTML = `
                    <div class="output">
                        ${err}
                    </div>
                `;
            });
    </script>
</body>
</html>
