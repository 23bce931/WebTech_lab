<!DOCTYPE html>
<html>
<head>
    <title>Exercise 2 - Localhost</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .output { background: #f0f8ff; padding: 20px; border-left: 4px solid #007acc; margin: 10px 0; }
        h1 { color: #007acc; }
    </style>
</head>
<body>
    <h1>Exercise 2 - Object Destructuring & Spread</h1>
    <div id="output1"></div>
    <div id="output2"></div>

    <script>
        // Student object
        const student = {
            id: 101,
            name: "Vineetha",
            department: "CSE",
            marks: 92
        };

        // Object destructuring
        const { id, name, department, marks } = student;
        document.getElementById('output1').innerHTML = `
            <div class="output">
                <strong>Destructured Values:</strong><br>
                ${id} ${name} ${department} ${marks}
            </div>
        `;

        // Spread operator - add grade
        const updatedStudent = {
            ...student,
            grade: "A"
        };
        document.getElementById('output2').innerHTML = `
            <div class="output">
                <strong>Updated Student Object:</strong><br>
                ${JSON.stringify(updatedStudent, null, 2)}
            </div>
        `;
    </script>
</body>
</html>
