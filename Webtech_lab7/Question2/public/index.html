<!DOCTYPE html>
<html>
<head>
<title>Online Book Finder</title>
</head>
<body>

<h2>Search Book</h2>
<input id="title" placeholder="Enter title">
<button onclick="searchBook()">Search</button>

<h2>Filter Category</h2>
<button onclick="filterCategory('Programming')">Programming</button>

<h2>Sort</h2>
<button onclick="sortPrice()">Sort by Price</button>
<button onclick="sortRating()">Sort by Rating</button>

<h2>Top Rated</h2>
<button onclick="topBooks()">Show Top Books</button>

<h2>Books</h2>
<div id="results"></div>

<script>

function display(data){
    let output="";
    data.forEach(book=>{
        output+=`<p>
        <b>${book.title}</b> - ${book.author} <br>
        Category: ${book.category} <br>
        Price: ${book.price} <br>
        Rating: ${book.rating}
        </p>`;
    });
    document.getElementById("results").innerHTML=output;
}

function searchBook(){
    let title=document.getElementById("title").value;
    fetch(`/books/search?title=${title}`)
    .then(res=>res.json())
    .then(display);
}

function filterCategory(cat){
    fetch(`/books/category/${cat}`)
    .then(res=>res.json())
    .then(display);
}

function sortPrice(){
    fetch(`/books/sort/price`)
    .then(res=>res.json())
    .then(display);
}

function sortRating(){
    fetch(`/books/sort/rating`)
    .then(res=>res.json())
    .then(display);
}

function topBooks(){
    fetch(`/books/top`)
    .then(res=>res.json())
    .then(display);
}

</script>

</body>
</html>
