<!DOCTYPE html>
<html>
<head>
<title>Student Notes Manager</title>
</head>

<body>

<h2>Add Note</h2>

Title: <input id="title"><br><br>
Subject: <input id="subject"><br><br>
Description: <input id="description"><br><br>

<button onclick="addNote()">Add Note</button>

<h2>All Notes</h2>

<button onclick="loadNotes()">View Notes</button>

<ul id="notesList"></ul>

<script>

function addNote(){

fetch("/notes",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
title:document.getElementById("title").value,
subject:document.getElementById("subject").value,
description:document.getElementById("description").value
})
})
.then(res=>res.json())
.then(data=>{
alert("Note Added");
loadNotes();
});
}


function loadNotes(){

fetch("/notes")
.then(res=>res.json())
.then(data=>{

let list=document.getElementById("notesList");
list.innerHTML="";

data.forEach(note=>{

let li=document.createElement("li");

li.innerHTML=
`
<b>${note.title}</b> (${note.subject})<br>
${note.description}<br>
<button onclick="deleteNote('${note._id}')">Delete</button>
<button onclick="editNote('${note._id}')">Edit</button>
<hr>
`;

list.appendChild(li);

});

});
}


function deleteNote(id){

fetch("/notes/"+id,{
method:"DELETE"
})
.then(()=>{
alert("Deleted");
loadNotes();
});

}


function editNote(id){

let newTitle=prompt("Enter new title");
let newDesc=prompt("Enter new description");

fetch("/notes/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
title:newTitle,
description:newDesc
})
})
.then(()=>{
alert("Updated");
loadNotes();
});

}

</script>

</body>
</html>
